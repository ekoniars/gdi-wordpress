version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: gdi_root_password
      MYSQL_DATABASE: gdi_wordpress
      MYSQL_USER: gdi_user
      MYSQL_PASSWORD: gdi_user_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  wordpress:
    image: wordpress:latest
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: gdi_wordpress
      WORDPRESS_DB_USER: gdi_user
      WORDPRESS_DB_PASSWORD: gdi_user_password
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - ./wp-content/themes/gdi:/var/www/html/wp-content/themes/gdi
    ports:
      - "80:80"

volumes:
  db_data:
