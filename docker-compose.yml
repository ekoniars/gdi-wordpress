version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gdi_db
    environment:
      MYSQL_DATABASE: gdi_wordpress
      MYSQL_ROOT_PASSWORD: gdi_root_secure_password_2024
      MYSQL_USER: gdi_user
      MYSQL_PASSWORD: gdi_user_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    image: wordpress:latest
    container_name: gdi_wordpress
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: gdi_wordpress
      WORDPRESS_DB_USER: gdi_user
      WORDPRESS_DB_PASSWORD: gdi_user_password
      WORDPRESS_DEBUG: "true"
      WORDPRESS_DEBUG_LOG: /var/www/html/wp-content/debug.log
    ports:
      - "8080:80"
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/gdi:/var/www/html/wp-content/themes/gdi
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gdi_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: gdi_user
      PMA_PASSWORD: gdi_user_password
    ports:
      - "8081:80"
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    container_name: gdi_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  db_data:
  wp_data:
