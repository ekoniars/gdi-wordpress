services:
  - type: web
    name: gdi-wordpress
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: WORDPRESS_DB_HOST
        value: mysql
      - key: WORDPRESS_DB_USER
        value: gdi_user
      - key: WORDPRESS_DB_PASSWORD
        fromDatabase:
          name: gdi-db
          property: password
      - key: WORDPRESS_DB_NAME
        value: gdi_wordpress

  - type: pserv
    name: mysql
    runtime: docker
    image:
      fromRegistry:
        url: mysql:8.0
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: gdi_root_password
      - key: MYSQL_DATABASE
        value: gdi_wordpress
      - key: MYSQL_USER
        value: gdi_user
      - key: MYSQL_PASSWORD
        value: gdi_user_password
